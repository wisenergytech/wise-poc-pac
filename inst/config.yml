default:
  ui:
    # Optimizers available in the sidebar radio buttons
    # Options: optimiseur (MILP), optimiseur_lp (LP), optimiseur_qp (QP)
    optimizers:
      - optimiseur
      - optimiseur_lp
      - optimiseur_qp

    # PV data sources available
    # Options: synthetic, real_elia, real_delaunoy
    pv_sources:
      - synthetic
      - real_elia
      - real_delaunoy

    # Show battery section in sidebar
    show_battery: true

    # Optimization strategies shown
    strategies:
      tou: true
      curtailment: true

    # Simple mode: hide optimizer/strategy controls, force LP 24h penalty 2.5 ToU
    simple_mode: true

    # Show optimizer choice (LP/MILP/QP) even in simple mode
    # true = user can pick optimizer, false = forced to LP
    show_optimizer_choice: true

    # Show Documentation tab
    show_documentation: true

profondeville:
  ui:
    optimizers:
      - optimiseur_lp
      - optimiseur_qp

    pv_sources:
      - real_elia
      - synthetic

    show_battery: false

    strategies:
      tou: true
      curtailment: false

    simple_mode: true

    show_optimizer_choice: false

    show_documentation: false
