# Data dictionary — bq_k0001 fused CSVs
# Generated by scripts/fetch_bigquery_pac.R on 2026-04-30
source:
  project: karno-410708
  dataset: wise
  script: scripts/fetch_bigquery_pac.R
  generated: "2026-04-30"
  period: ["2025-11-20", "2026-04-30"]
  resolution: 15min
  raw_resolution: 5min

raw_dumps:
  bq_k0001_raw.csv:
    table: "karno-410708.wise.k0001"
    query: "SELECT *"
    resolution: 5min
  bq_k0001_ores_raw.csv:
    table: "karno-410708.wise.k0001_ores"
    query: "SELECT *"
    resolution: 5min

columns:
  timestamp:
    bq_tables: [k0001, k0001_ores]
    bq_column: time
    aggregation: floor_date(15min)
    unit: datetime

  pac_kwh:
    bq_table: k0001
    bq_column: Elec_consumption
    aggregation: sum(15min)
    unit: kWh_e/qt

  t_ballon:
    bq_table: k0001
    bq_column: T_tankUp
    aggregation: mean(15min)
    unit: degC

  cop:
    bq_table: k0001
    bq_column: COP
    aggregation: mean(15min)
    unit: dimensionless

  offtake_kwh:
    bq_table: k0001_ores
    bq_column: Consumption_index_kWh
    aggregation: delta(last - lag, 15min)
    unit: kWh/qt

  feedin_kwh:
    bq_table: k0001_ores
    bq_column: Injection_index_kWh
    aggregation: delta(last - lag, 15min)
    unit: kWh/qt

  pv_kwh:
    source_elia: "Elia ODS032/ODS087 (region Namur), scaled to 65 kWc"
    source_fusion: "FusionSolar 5-min CSVs (3 inverters), sum(15min)"
    unit: kWh/qt

